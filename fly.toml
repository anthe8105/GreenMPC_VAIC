# fly.toml app configuration file generated for greenmpc-twin on 2026-07-19T00:42:58+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'greenmpc-twin'
primary_region = 'sin'

# Swap buffer so a transient MPC-solve memory spike spills to disk instead of
# triggering an OOM kill (which surfaces to the client as an HTTP 502).
swap_size_mb = 512

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  # 4 GB gives the cvxpy/HiGHS MPC solve headroom; the 2 GB preset OOM-killed
  # the machine on the heaviest hour (HTTP 502). shared-cpu-2x is the smallest
  # shared preset that supports 4 GB. Scale-to-zero keeps idle cost ~0.
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
